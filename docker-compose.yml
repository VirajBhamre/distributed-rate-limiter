x-app-env: &app-env
  SERVER_PORT: "8080"
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ratelimiter
  SPRING_DATASOURCE_USERNAME: ratelimiter
  SPRING_DATASOURCE_PASSWORD: ratelimiter
  DB_POOL_MAX: "32"
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
  JWT_SECRET: "docker-compose-jwt-secret-change-me-256-bits-minimum-length-for-hs256"

x-app: &app
  build:
    context: ./ratelimiter
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - app-net
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: ratelimiter
      POSTGRES_USER: ratelimiter
      POSTGRES_PASSWORD: ratelimiter
    ports:
      # Host port for DBeaver / local tools (DB user & name: ratelimiter)
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratelimiter -d ratelimiter"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-net

  app-1:
    <<: *app
    environment:
      <<: *app-env
      APP_INSTANCE_ID: app-1

  app-2:
    <<: *app
    environment:
      <<: *app-env
      APP_INSTANCE_ID: app-2

  app-3:
    <<: *app
    environment:
      <<: *app-env
      APP_INSTANCE_ID: app-3

  app-4:
    <<: *app
    environment:
      <<: *app-env
      APP_INSTANCE_ID: app-4

  app-5:
    <<: *app
    environment:
      <<: *app-env
      APP_INSTANCE_ID: app-5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app-1
      - app-2
      - app-3
      - app-4
      - app-5
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    name: distributed-rate-limiter-net

volumes:
  pgdata:
